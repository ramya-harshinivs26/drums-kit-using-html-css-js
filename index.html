<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Drums Kit</title>
</head>
<body>
    
<audio data-key="w" src="sounds/kick-electro02.wav"></audio>

    <div data-key="s" class="drum" id="s">S</div>

    <div data-key="j" class="drum" id="j">J</div>
